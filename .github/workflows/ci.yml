name: CI

# Fix 10 — regression suite gate.
# Runs the pure unit/regression suite (STT repair, question dedup, grounded
# better-answer, score-scale, resume parsing, audit trail, Redis memory cache)
# on every PR and on pushes to main. No DB / network / LLM — tests/conftest.py
# seeds dummy settings so app.config imports cleanly.
#
# To make this BLOCK merges: in GitHub → Settings → Branches → branch protection
# for `main`, mark the "Backend regression suite" and "Frontend typecheck" checks
# as required.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend regression suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: python -m pytest -q

  frontend-typecheck:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit -p tsconfig.json
