[pytest]
# Scope collection to the real unit-test suite. This deliberately excludes:
#   - test_queue.py  : a manual DB-inspection script (its function is named
#                      test(), so pytest would otherwise collect it and try to
#                      open a live database connection — it is run directly via
#                      `python test_queue.py`, not under pytest).
#   - test_results.txt / *.txt at the repo root : non-Python artifacts that a
#                      bare `pytest` invocation tried to read as test modules
#                      and crashed on (binary/UTF-16 content).
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
